<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptGallery — Discover AI Image Prompts</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="#" class="logo" onclick="resetFilters()">
        <span class="logo-icon">✦</span>
        <span class="logo-text">PromptGallery</span>
      </a>

      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search prompts, styles, categories…" autocomplete="off" />
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>

      <div class="header-actions">
        <button class="btn-upload" onclick="showToast('Upload feature coming soon!')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Share
        </button>
        <button class="btn-profile" onclick="showToast('Sign in feature coming soon!')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </div>

    <!-- CATEGORIES -->
    <nav class="categories-nav" id="categoriesNav">
      <button class="cat-btn active" data-cat="All">All</button>
      <button class="cat-btn" data-cat="Portrait">Portrait</button>
      <button class="cat-btn" data-cat="Anime">Anime</button>
      <button class="cat-btn" data-cat="Ghibli">Ghibli</button>
      <button class="cat-btn" data-cat="Cinematic">Cinematic</button>
      <button class="cat-btn" data-cat="Interior Design">Interior Design</button>
      <button class="cat-btn" data-cat="Architecture">Architecture</button>
      <button class="cat-btn" data-cat="Fantasy">Fantasy</button>
      <button class="cat-btn" data-cat="Product Photography">Product Photography</button>
      <button class="cat-btn" data-cat="Nature">Nature</button>
    </nav>
  </header>

  <!-- HERO STRIP -->
  <div class="hero-strip">
    <p class="hero-tagline">Discover &amp; share the world's best <span class="gold">AI image prompts</span></p>
  </div>

  <!-- MAIN GRID -->
  <main class="gallery-container" id="galleryContainer">
    <div class="masonry-grid" id="masonryGrid"></div>
    <div class="no-results" id="noResults" style="display:none;">
      <div class="no-results-icon">✦</div>
      <h3>No prompts found</h3>
      <p>Try a different search term or category</p>
      <button class="btn-reset" onclick="resetFilters()">Browse all prompts</button>
    </div>
  </main>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-image-wrap">
        <img id="modalImage" src="" alt="" />
        <div class="modal-model-badge" id="modalModelBadge"></div>
      </div>
      <div class="modal-body">
        <div class="modal-header-row">
          <div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-meta">
              <span class="modal-category" id="modalCategory"></span>
              <span class="modal-likes">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span id="modalLikes"></span>
              </span>
            </div>
          </div>
          <button class="modal-fav-btn" id="modalFavBtn" onclick="toggleFavFromModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          </button>
        </div>

        <div class="modal-tags" id="modalTags"></div>

        <div class="prompt-box">
          <div class="prompt-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Full Prompt
          </div>
          <p class="prompt-text" id="modalPrompt"></p>
        </div>

        <div class="modal-actions">
          <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Prompt
          </button>
          <button class="btn-save" onclick="toggleFavFromModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Save
          </button>
          <button class="btn-share" onclick="sharePrompt()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SCROLL TO TOP -->
  <button class="scroll-top" id="scrollTop" onclick="scrollToTop()" title="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-logo">✦ PromptGallery</div>
    <p>The world's finest collection of AI image prompts</p>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
    <p class="footer-copy">© 2025 PromptGallery. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
